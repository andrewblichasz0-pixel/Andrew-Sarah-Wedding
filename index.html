<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andrew & Sarah Wedding</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Lora&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  font-family:'Lora',serif;
  background:#fffaf9;
  color:#4a3f3f;
}
h1{
  font-size:3rem;
  margin-bottom:10px;
}
header{
  display:flex;
  justify-content:center;
  gap:40px;
  padding:20px;
  background:white;
  border-bottom:1px solid #eee;
  position:sticky;
  top:0;
  z-index:10;
}
header a{
  text-decoration:none;
  color:#b76e79;
  font-weight:bold;
  transition:0.3s;
}
header a:hover{
  color:#9e5d66;
}
.hero{
  text-align:center;
  padding:20px 20px 17px; /* moved up 4px from 33px */
}
.hero p{
  color:#7a6a6a;
  font-size:1.2rem;
  margin:5px 0;
}
.countdown{
  margin-top:20px;
  font-size:1.5rem;
  color:#b76e79;
}
.slideshow{
  max-width:1100px;
  margin:28px auto 0; /* keeps it centered and nudged up */
  position:relative;
}
.slide{
  position:absolute;
  width:100%;
  height:650px;
  object-fit:cover;
  object-position:center 30%;
  border-radius:12px;
  opacity:0;
  animation:fade 110s infinite;
}
@keyframes fade{
  0%{opacity:0;}
  5%{opacity:1;}
  20%{opacity:1;}
  25%{opacity:0;}
  100%{opacity:0;}
}
.slide:nth-child(1){animation-delay:0s;}
.slide:nth-child(2){animation-delay:10s;}
.slide:nth-child(3){animation-delay:20s;}
.slide:nth-child(4){animation-delay:30s;}
.slide:nth-child(5){animation-delay:40s;}
.slide:nth-child(6){animation-delay:50s;}
.slide:nth-child(7){animation-delay:60s;}
.slide:nth-child(8){animation-delay:70s;}
.slide:nth-child(9){animation-delay:80s;}
.slide:nth-child(10){animation-delay:90s;}
.slide:nth-child(11){animation-delay:100s;}
.slide:nth-child(12){animation-delay:110s;}
@media(max-width:768px){
  .slide{height:400px;}
}
</style>
</head>
<body>
<header>
  <a href="index.html">Home</a>
  <a href="ourstory.html">Our Story</a>
  <a href="rsvp.html">RSVP</a>
  <a href="hotel.html">Hotel Block</a>
  <a href="schedule.html">Schedule</a>
  <a href="registry.html">Registry</a>
  <a href="info.html">Info</a>
</header>

<div class="hero">
  <h1>We're Getting Married!</h1>
  <p>October 17, 2026 • Tampa, Florida</p>
  <p>Ceremony at 5:00 PM</p>
  <div class="countdown" id="countdown"></div>
</div>

<div class="slideshow">
  <img class="slide" src="IMG_0122.jpeg">
  <img class="slide" src="IMG_0702.jpeg">
  <img class="slide" src="IMG_2148.jpeg">
  <img class="slide" src="IMG_3051.jpeg">
  <img class="slide" src="IMG_3810.jpeg">
  <img class="slide" src="IMG_3835.jpeg">
  <img class="slide" src="IMG_4259.jpeg">
  <img class="slide" src="IMG_9302.jpeg">
  <img class="slide" src="IMG_9365.jpeg">
  <img class="slide" src="IMG_9375.jpeg">
  <img class="slide" src="IMG_9376.jpeg">
  <img class="slide" src="Resized_20250607_153750.jpeg">
</div>

<script>
const weddingDate = new Date("October 17, 2026 17:00:00").getTime();
setInterval(() => {
  const now = new Date().getTime();
  const diff = weddingDate - now;
  const days = Math.floor(diff / (1000*60*60*24));
  document.getElementById("countdown").innerHTML = days + " days to go";
},1000);
</script>
</body>
</html>
