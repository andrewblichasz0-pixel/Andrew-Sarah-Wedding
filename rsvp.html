<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RSVP - Andrew & Sarah</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&display=swap" rel="stylesheet" />
<style>
  body {
    margin: 0;
    font-family: 'Lora', serif;
    background: #fffaf9;
    color: #4a3f3f;
  }

  /* dropdown button */
  .menu-btn{
    background:#b76e79;
    color:white;
    border:none;
    padding:10px 15px;
    font-size:16px;
    cursor:pointer;
    border-radius:6px;
  }

  /* dropdown container */
  .dropdown{
    position:relative;
    display:inline-block;
  }

  /* dropdown content */
  .dropdown-content{
    display:none;
    position:absolute;
    top:45px;
    left:0;
    background:white;
    min-width:160px;
    box-shadow:0 8px 16px rgba(0,0,0,0.1);
    border-radius:8px;
    overflow:hidden;
  }

  .dropdown-content a{
    display:block;
    padding:10px;
    text-decoration:none;
    color:#b76e79;
    font-weight:bold;
  }

  .dropdown-content a:hover{
    background:#f8eeee;
  }

  /* show dropdown */
  .show{
    display:block;
  }

  section {
    max-width: 700px;
    margin: 10px auto;
    padding: 20px;
    text-align: center;
  }

  h1 {
    color: #b76e79;
    margin-top: 0;
    margin-bottom: 10px;
  }

  h2 {
    color: #b76e79;
    margin-top: 0;
    margin-bottom: 10px;
  }

  iframe {
    width: 100%;
    height: 750px;
    border: none;
    border-radius: 10px;
  }
</style>
</head>
<body>

<header>
  <div class="dropdown">
    <button class="menu-btn" onclick="toggleMenu()">Menu ☰</button>
    <div id="menu" class="dropdown-content">
      <a href="index.html">Home</a>
      <a href="ourstory.html">Our Story</a>
      <a href="rsvp.html">RSVP</a>
      <a href="hotel.html">Hotel Block</a>
      <a href="schedule.html">Schedule</a>
      <a href="registry.html">Registry</a>
      <a href="info.html">Info</a>
    </div>
  </div>
</header>

<section>
  <h1>RSVP</h1>
  <h2>Let us know if you can celebrate with us!</h2>

  <!-- Embedded Google Form -->
  <iframe 
    src="https://docs.google.com/forms/d/e/1FAIpQLSe9XSFhzrTmIn9H1Hq-e3Ei7pHMKjLr4yJpIvlE3PLl9pv-mw/viewform?embedded=true" 
    frameborder="0" 
    marginheight="0" 
    marginwidth="0"
    loading="lazy"
  >Loading…</iframe>
</section>

<script>
function toggleMenu(){
  document.getElementById("menu").classList.toggle("show");
}
</script>

</body>
</html>
