<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule - Andrew & Sarah</title>
<!-- Lora font -->
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Lora', serif;
  background: #fffaf9;
  color: #4a3f3f;
}

/* dropdown button */
.menu-btn{
  background:#b76e79;
  color:white;
  border:none;
  padding:10px 15px;
  font-size:16px;
  cursor:pointer;
  border-radius:6px;
}

/* dropdown container */
.dropdown{
  position:relative;
  display:inline-block;
}

/* dropdown content */
.dropdown-content{
  display:none;
  position:absolute;
  top:45px;
  left:0;
  background:white;
  min-width:160px;
  box-shadow:0 8px 16px rgba(0,0,0,0.1);
  border-radius:8px;
  overflow:hidden;
}

.dropdown-content a{
  display:block;
  padding:10px;
  text-decoration:none;
  color:#b76e79;
  font-weight:bold;
}

.dropdown-content a:hover{
  background:#f8eeee;
}

/* show dropdown */
.show{
  display:block;
}

section {
  max-width: 600px;
  margin: 20px auto;
  padding: 20px;
  text-align: center;
}

h1, h2 {
  font-family: 'Lora', serif;
  color: #b76e79;
  margin-top: 0;
  margin-bottom: 16px;
}

p {
  font-size: 1.2rem;
  line-height: 1.6;
  margin-bottom: 12px;
}

ul {
  list-style-type: none;
  padding: 0;
  font-size: 1.15rem;
}

ul li {
  padding: 8px 0;
  border-bottom: 1px solid #e0d0d0;
}
</style>
</head>
<body>

<header>
  <div class="dropdown">
    <button class="menu-btn" onclick="toggleMenu()">Menu ☰</button>
    <div id="menu" class="dropdown-content">
      <a href="index.html">Home</a>
      <a href="ourstory.html">Our Story</a>
      <a href="rsvp.html">RSVP</a>
      <a href="hotel.html">Hotel Block</a>
      <a href="schedule.html">Schedule</a>
      <a href="registry.html">Registry</a>
      <a href="info.html">Info</a>
    </div>
  </div>
</header>

<section>
  <h1>Wedding Schedule</h1>
  <h2>Everything you need to know for the big day</h2>
  <ul>
    <li>5:30 - 6:00 PM - Arrival</li>
    <li>6:00 - 6:30 PM – Ceremony</li>
    <li>6:30 - 7:30 PM – Cocktail Hour</li>
    <li>7:30 - 8:30 PM – Dinner & Toasts</li>
    <li>8:30 - 11:00 PM – Dancing & Celebration</li>
  </ul>
</section>

<script>
function toggleMenu(){
  document.getElementById("menu").classList.toggle("show");
}
</script>

</body>
</html>
