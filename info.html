/* UPDATED HEADER */
header{
  position:sticky;
  top:0;
  z-index:10;
  background:white;
  padding:10px;
  border-bottom:1px solid #eee;
}

/* dropdown button */
.menu-btn{
  background:#b76e79;
  color:white;
  border:none;
  padding:10px 15px;
  font-size:16px;
  cursor:pointer;
  border-radius:6px;
}

/* dropdown container */
.dropdown{
  position:relative;
  display:inline-block;
}

/* dropdown content */
.dropdown-content{
  display:none;
  position:absolute;
  top:45px;
  left:0;
  background:white;
  min-width:160px;
  box-shadow:0 8px 16px rgba(0,0,0,0.1);
  border-radius:8px;
  overflow:hidden;
}

.dropdown-content a{
  display:block;
  padding:10px;
  text-decoration:none;
  color:#b76e79;
  font-weight:bold;
}

.dropdown-content a:hover{
  background:#f8eeee;
}

/* show dropdown */
.show{
  display:block;
}

section { max-width:700px; margin:40px auto; padding:20px; text-align:center; }
h1,h2 { color:#b76e79; margin:10px 0; }
p { font-size:1.1rem; margin:10px 0; }
iframe { width:100%; height:300px; border:none; border-radius:10px; margin-top:10px; }
img { width:100%; border-radius:12px; margin-top:10px; }
